<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NUVA OXI | Control comercial</title>
  <link rel="icon" type="image/jpeg" href="logo nuva oxi.jpeg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="gate" class="gate">
    <div class="gate-box">
      <img class="gate-logo" src="logo nuva oxi.jpeg" alt="NUVA OXI">
      <div class="gate-lock">Documento confidencial</div>
      <p>Informacion comercial interna. Ingresa la clave para continuar.</p>
      <input id="gateInput" type="password" inputmode="numeric" placeholder="Clave" autocomplete="off">
      <button id="gateBtn" type="button">Ingresar</button>
      <div id="gateErr" class="gate-err"></div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="brand">
      <img class="brand-logo-img" src="logo nuva oxi.jpeg" alt="NUVA OXI">
      <small>Control comercial</small>
    </div>
    <nav id="nav">
      <button class="active" data-view="dashboard" type="button">Dashboard</button>
      <button data-view="cobertura" type="button">Cobertura</button>
      <button data-view="ventas" type="button">Ventas</button>
      <button data-view="inventario" type="button">Inventario</button>
      <button data-view="clientes" type="button">Clientes / PDV</button>
      <button data-view="productos" type="button">Productos</button>
      <button data-view="registro" type="button">Registro</button>
    </nav>
    <div class="side-foot">
      <span id="sourceName">Excel unico</span>
      <a class="download-link" href="data/NUVA_OXI_Control_Comercial_FINAL_v2.xlsx" download>Descargar Excel</a>
    </div>
  </aside>

  <main class="content">
    <header class="topbar">
      <div>
        <h1 id="viewTitle">Dashboard</h1>
        <span id="statusLine" class="muted">Cargando base comercial...</span>
      </div>
      <input id="globalSearch" type="search" placeholder="Buscar">
    </header>
    <section id="app" class="app">
      <div class="loading">Leyendo Excel...</div>
    </section>
  </main>

  <script src="vendor/xlsx-style.bundle.js"></script>
  <script src="app.js"></script>
</body>
</html>
